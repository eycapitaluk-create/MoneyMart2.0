name: CI

on:
  pull_request:
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        id: lint
        continue-on-error: true
        run: npm run lint 2>&1 | tee lint.log

      - name: Build
        id: build
        continue-on-error: true
        run: npm run build 2>&1 | tee build.log

      - name: AI triage (lint or build failed)
        if: steps.lint.outcome == 'failure' || steps.build.outcome == 'failure'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/gh-ai-triage.mjs ci lint.log build.log

      - name: Require lint and build success
        if: always()
        run: |
          echo "lint=${{ steps.lint.outcome }} build=${{ steps.build.outcome }}"
          if [ "${{ steps.lint.outcome }}" != "success" ] || [ "${{ steps.build.outcome }}" != "success" ]; then
            exit 1
          fi
