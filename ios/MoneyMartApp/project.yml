name: MoneyMartApp
options:
  minimumXcodeGenVersion: 2.38.0
configs:
  Debug: debug
  Release: release
targets:
  MoneyMartApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: .
        excludes:
          - README.md
          - SUPABASE_QUERY_SPEC.md
          - project.yml
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: co.moneymart.app
      INFOPLIST_FILE: Info.plist
    info:
      path: Info.plist
      properties:
        UILaunchScreen: {}
        SUPABASE_URL: "https://YOUR_PROJECT_REF.supabase.co"
        SUPABASE_ANON_KEY: "YOUR_ANON_KEY"
        CFBundleDisplayName: MoneyMart
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"

